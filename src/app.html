<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta property="og:title" content="CE Nextgen AI Camp" />
		<meta
			property="og:description"
			content="CE Nextgen AI Camp. The starting point for world changers with AI." />
		<meta
			name="description"
			content="CE Nextgen AI Camp. The starting point for world changers with AI." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="%sveltekit.env.PUBLIC_ORIGIN%/" />
		<meta property="og:image" content="%sveltekit.env.PUBLIC_ORIGIN%/favicon-96x96.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@100;200;300;400;500;600;700&family=Noto+Sans+Thai:wght@100..900&display=swap"
			rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="min-height: calc(100dvh - 8rem)" class="pb-8">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
