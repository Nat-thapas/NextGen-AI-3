<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta property="og:title" content="Nextgen AI Camp" />
		<meta
			property="og:description"
			content="Nextgen AI Camp. The starting point for world changers with AI." />
		<meta
			name="description"
			content="Nextgen AI Camp. The starting point for world changers with AI." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="%sveltekit.env.PUBLIC_ORIGIN%/%sveltekit.assets%" />
		<meta
			property="og:image"
			content="%sveltekit.env.PUBLIC_ORIGIN%%sveltekit.assets%/favicon-96x96.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="min-height: calc(100dvh - 2rem)" class="pb-8 overflow-x-hidden ">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
